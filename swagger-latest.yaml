host: podman.io
info:
    contact:
        email: podman@lists.podman.io
        name: Podman
        url: https://podman.io/community/
    description: |-
        This documentation describes the Podman v2.x+ RESTful API. It consists of a Docker-compatible
        API and a Libpod API providing support for Podman’s unique features such as pods.

        To start the service and keep it running for 5,000 seconds (-t 0 runs forever):

        podman system service -t 5000 &

        You can then use cURL on the socket using requests documented below.

        NOTE: if you install the package podman-docker, it will create a symbolic
        link for /run/docker.sock to /run/podman/podman.sock

        NOTE: Some fields in the API response JSON are encoded as omitempty, which means that
        if said field has a zero value, they will not be encoded in the API response. This
        is a feature to help reduce the size of the JSON responses returned via the API.

        NOTE: Due to the limitations of [go-swagger](https://github.com/go-swagger/go-swagger),
        some field values that have a complex type show up as null in the docs as well as in the
        API responses. This is because the zero value for the field type is null. The field
        description in the docs will state what type the field is expected to be for such cases.

        See podman-system-service(1) for more information.

        Quick Examples:

        'podman info'

        curl --unix-socket /run/podman/podman.sock http://d/v6.0.0/libpod/info

        'podman pull quay.io/containers/podman'

        curl -XPOST --unix-socket /run/podman/podman.sock -v 'http://d/v6.0.0/images/create?fromImage=quay.io%2Fcontainers%2Fpodman'

        'podman list images'

        curl --unix-socket /run/podman/podman.sock -v 'http://d/v6.0.0/libpod/images/json' | jq
    license:
        name: Apache-2.0
        url: https://opensource.org/licenses/Apache-2.0
    termsOfService: https://github.com/containers/podman/blob/913caaa9b1de2b63692c9bae15120208194c9eb3/LICENSE
    title: supports a RESTful API for the Libpod library
    version: 5.0.0
    x-logo:
        - url: https://raw.githubusercontent.com/containers/libpod/main/logo/podman-logo.png
        - altText: Podman logo
paths:
    /auth:
        post:
            operationId: SystemAuth
            parameters:
                - description: Authentication to check
                  in: body
                  name: authConfig
                  schema:
                    $ref: '#/definitions/AuthConfig'
            produces:
                - application/json
            responses:
                "200":
                    $ref: '#/responses/systemAuthResponse'
                "500":
                    $ref: '#/responses/internalError'
            summary: Check auth configuration
            tags:
                - system (compat)
    /build:
        post:
            description: Build an image from the given Dockerfile(s)
            operationId: ImageBuild
            parameters:
                - default: application/x-tar
                  enum:
                    - application/x-tar
                  in: header
                  name: Content-Type
                  type: string
                - in: header
                  name: X-Registry-Config
                  type: string
                - default: Dockerfile
                  description: |
                    Path within the build context to the `Dockerfile`.
                    This is ignored if remote is specified and points to an external `Dockerfile`.
                  in: query
                  name: dockerfile
                  type: string
                - default: latest
                  description: A name and optional tag to apply to the image in the `name:tag` format. If you omit the tag, the default latest value is assumed. You can provide several t parameters.
                  in: query
                  name: t
                  type: string
                - description: |
                    TBD Extra hosts to add to /etc/hosts
                    (As of version 1.xx)
                  in: query
                  name: extrahosts
                  type: string
                - description: |
                    Not to create /etc/hosts when building the image
                  in: query
                  name: nohosts
                  type: boolean
                - description: |
                    A Git repository URI or HTTP/HTTPS context URI.
                    If the URI points to a single text file, the file’s contents are placed
                    into a file called Dockerfile and the image is built from that file. If
                    the URI points to a tarball, the file is downloaded by the daemon and the
                    contents therein used as the context for the build. If the URI points to a
                    tarball and the dockerfile parameter is also specified, there must be a file
                    with the corresponding path inside the tarball.
                    (As of version 1.xx)
                  in: query
                  name: remote
                  type: string
                - default: 3
                  description: |
                    Number of times to retry in case of failure when performing push/pull.
                  in: query
                  name: retry
                  type: integer
                - default: 2s
                  description: |
                    Delay between retries in case of push/pull failures.
                  in: query
                  name: retry-delay
                  type: string
                - default: false
                  description: |
                    Suppress verbose build output
                  in: query
                  name: q
                  type: boolean
                - default: false
                  description: |
                    Do not use the cache when building the image
                    (As of version 1.xx)
                  in: query
                  name: nocache
                  type: boolean
                - description: |
                    JSON array of images used to build cache resolution
                    (As of version 1.xx)
                  in: query
                  name: cachefrom
                  type: string
                - default: false
                  description: |
                    Attempt to pull the image even if an older image exists locally
                    (As of version 1.xx)
                  in: query
                  name: pull
                  type: boolean
                - default: true
                  description: |
                    Remove intermediate containers after a successful build
                    (As of version 1.xx)
                  in: query
                  name: rm
                  type: boolean
                - default: false
                  description: |
                    Always remove intermediate containers, even upon failure
                    (As of version 1.xx)
                  in: query
                  name: forcerm
                  type: boolean
                - description: |
                    Memory is the upper limit (in bytes) on how much memory running containers can use
                    (As of version 1.xx)
                  in: query
                  name: memory
                  type: integer
                - description: |
                    MemorySwap limits the amount of memory and swap together
                    (As of version 1.xx)
                  in: query
                  name: memswap
                  type: integer
                - description: |
                    CPUShares (relative weight
                    (As of version 1.xx)
                  in: query
                  name: cpushares
                  type: integer
                - description: |
                    CPUSetCPUs in which to allow execution (0-3, 0,1)
                    (As of version 1.xx)
                  in: query
                  name: cpusetcpus
                  type: string
                - description: |
                    CPUPeriod limits the CPU CFS (Completely Fair Scheduler) period
                    (As of version 1.xx)
                  in: query
                  name: cpuperiod
                  type: integer
                - description: |
                    CPUQuota limits the CPU CFS (Completely Fair Scheduler) quota
                    (As of version 1.xx)
                  in: query
                  name: cpuquota
                  type: integer
                - description: |
                    JSON map of string pairs denoting build-time variables.
                    For example, the build argument `Foo` with the value of `bar` would be encoded in JSON as `["Foo":"bar"]`.

                    For example, buildargs={"Foo":"bar"}.

                    Note(s):
                    * This should not be used to pass secrets.
                    * The value of buildargs should be URI component encoded before being passed to the API.

                    (As of version 1.xx)
                  in: query
                  name: buildargs
                  type: string
                - default: 67108864
                  description: |
                    ShmSize is the "size" value to use when mounting an shmfs on the container's /dev/shm directory.
                    Default is 64MB
                    (As of version 1.xx)
                  in: query
                  name: shmsize
                  type: integer
                - default: false
                  description: |
                    Silently ignored.
                    Squash the resulting images layers into a single layer
                    (As of version 1.xx)
                  in: query
                  name: squash
                  type: boolean
                - description: |
                    JSON map of key, value pairs to set as labels on the new image
                    (As of version 1.xx)
                  in: query
                  name: labels
                  type: string
                - default: bridge
                  description: |
                    Sets the networking mode for the run commands during build.
                    Supported standard values are:
                      * `bridge` limited to containers within a single host, port mapping required for external access
                      * `host` no isolation between host and containers on this network
                      * `none` disable all networking for this container
                      * container:<nameOrID> share networking with given container
                      ---All other values are assumed to be a custom network's name
                    (As of version 1.xx)
                  in: query
                  name: networkmode
                  type: string
                - description: |
                    Platform format os[/arch[/variant]]
                    Can be comma separated list for multi arch builds.
                    (As of version 1.xx)
                  in: query
                  name: platform
                  type: string
                - description: |
                    Target build stage
                    (As of version 1.xx)
                  in: query
                  name: target
                  type: string
                - description: |
                    output configuration TBD
                    (As of version 1.xx)
                  in: query
                  name: outputs
                  type: string
                - description: |
                    A tar archive compressed with one of the following algorithms:
                    identity (no compression), gzip, bzip2, xz.
                  in: body
                  name: inputStream
                  schema:
                    format: binary
                    type: string
            produces:
                - application/json
            responses:
                "200":
                    description: OK (As of version 1.xx)
                    schema:
                        properties:
                            stream:
                                description: output from build process
                                example: |
                                    (build details...)
                                    Successfully built 8ba084515c724cbf90d447a63600c0a6
                                    Successfully tagged your_image:latest
                                type: string
                        required:
                            - stream
                        type: object
                "400":
                    $ref: '#/responses/badParamError'
                "500":
                    $ref: '#/responses/internalError'
            summary: Build image
            tags:
                - images (compat)
    /commit:
        post:
            description: Create a new image from a container
            operationId: ImageCommit
            parameters:
                - description: the name or ID of a container
                  in: query
                  name: container
                  type: string
                - description: the repository name for the created image
                  in: query
                  name: repo
                  type: string
                - description: tag name for the created image
                  in: query
                  name: tag
                  type: string
                - description: commit message
                  in: query
                  name: comment
                  type: string
                - description: author of the image
                  in: query
                  name: author
                  type: string
                - description: pause the container before committing it
                  in: query
                  name: pause
                  type: boolean
                - description: instructions to apply while committing in Dockerfile format
                  in: query
                  name: changes
                  type: string
                - description: squash newly built layers into a single new layer
                  in: query
                  name: squash
                  type: boolean
            produces:
                - application/json
            responses:
                "201":
                    description: no error
                "404":
                    $ref: '#/responses/imageNotFound'
                "500":
                    $ref: '#/responses/internalError'
            summary: New Image
            tags:
                - containers (compat)
    /containers/{name}:
        delete:
            operationId: ContainerDelete
            parameters:
                - description: the name or ID of the container
                  in: path
                  name: name
                  required: true
                  type: string
                - default: false
                  description: If the container is running, kill it before removing it.
                  in: query
                  name: force
                  type: boolean
                - default: false
                  description: Remove the volumes associated with the container.
                  in: query
                  name: v
                  type: boolean
                - description: not supported
                  in: query
                  name: link
                  type: boolean
                - default: false
                  description: Ignore if a specified container does not exist.
                  in: query
                  name: ignore
                  type: boolean
                - default: false
                  description: Remove container dependencies.
                  in: query
                  name: depend
                  type: boolean
                - description: Number of seconds to wait before forcibly stopping the container.
                  in: query
                  name: timeout
                  type: integer
                - default: false
                  description: Remove anonymous volumes associated with the container.
                  in: query
                  name: volumes
                  type: boolean
            produces:
                - application/json
            responses:
                "204":
                    description: no error
                "400":
                    $ref: '#/responses/badParamError'
                "404":
                    $ref: '#/responses/containerNotFound'
                "409":
                    $ref: '#/responses/conflictError'
                "500":
                    $ref: '#/responses/internalError'
            summary: Remove a container
            tags:
                - containers (compat)
    /containers/{name}/archive:
        get:
            description: Get a tar archive of files from a container
            operationId: ContainerArchive
            parameters:
                - description: container name or id
                  in: path
                  name: name
                  required: true
                  type: string
                - description: Path to a directory in the container to extract
                  in: query
                  name: path
                  required: true
                  type: string
            produces:
                - application/json
            responses:
                "200":
                    description: no error
                    schema:
                        format: binary
                        type: string
                "400":
                    $ref: '#/responses/badParamError'
                "404":
                    $ref: '#/responses/containerNotFound'
                "500":
                    $ref: '#/responses/internalError'
            summary: Get files from a container
            tags:
                - containers (compat)
        put:
            description: Put a tar archive of files into a container
            operationId: PutContainerArchive
            parameters:
                - description: container name or id
                  in: path
                  name: name
                  required: true
                  type: string
                - description: Path to a directory in the container to extract
                  in: query
                  name: path
                  required: true
                  type: string
                - description: if unpacking the given content would cause an existing directory to be replaced with a non-directory and vice versa (1 or true)
                  in: query
                  name: noOverwriteDirNonDir
                  type: string
                - description: copy UID/GID maps to the dest file or di (1 or true)
                  in: query
                  name: copyUIDGID
                  type: string
                - description: tarfile of files to copy into the container
                  in: body
                  name: request
                  schema:
                    type: string
            produces:
                - application/json
            responses:
                "200":
                    description: no error
                "400":
                    $ref: '#/responses/badParamError'
                "403":
                    description: the container rootfs is read-only
                "404":
                    $ref: '#/responses/containerNotFound'
                "500":
                    $ref: '#/responses/internalError'
            summary: Put files into a container
            tags:
                - containers (compat)
    /containers/{name}/attach:
        post:
            description: |
                Attach to a container to read its output or send it input. You can attach
                to the same container multiple times and you can reattach to containers
                that have been detached.

                It uses the same stream format as docker, see the libpod attach endpoint for a description of the format.
            operationId: ContainerAttach
            parameters:
                - description: the name or ID of the container
                  in: path
                  name: name
                  required: true
                  type: string
                - description: keys to use for detaching from the container
                  in: query
                  name: detachKeys
                  type: string
                - description: Stream all logs from the container across the connection. Happens before streaming attach (if requested). At least one of logs or stream must be set
                  in: query
                  name: logs
                  type: boolean
                - default: true
                  description: Attach to the container. If unset, and logs is set, only the container's logs will be sent. At least one of stream or logs must be set
                  in: query
                  name: stream
                  type: boolean
                - description: Attach to container STDOUT
                  in: query
                  name: stdout
                  type: boolean
                - description: Attach to container STDERR
                  in: query
                  name: stderr
                  type: boolean
                - description: Attach to container STDIN
                  in: query
                  name: stdin
                  type: boolean
            produces:
                - application/json
            responses:
                "101":
                    description: No error, connection has been hijacked for transporting streams.
                "400":
                    $ref: '#/responses/badParamError'
                "404":
                    $ref: '#/responses/containerNotFound'
                "500":
                    $ref: '#/responses/internalError'
            summary: Attach to a container
            tags:
                - containers (compat)
    /containers/{name}/changes:
        get:
            description: |
                Returns which files in a container's filesystem have been added, deleted, or modified. The Kind of modification can be one of:

                0: Modified
                1: Added
                2: Deleted
            operationId: ContainerChanges
            parameters:
                - description: the name or id of the container
                  in: path
                  name: name
                  required: true
                  type: string
                - description: specify a second layer which is used to compare against it instead of the parent layer
                  in: query
                  name: parent
                  type: string
                - description: select what you want to match, default is all
                  enum:
                    - all
                    - container
                    - image
                  in: query
                  name: diffType
                  type: string
            responses:
                "200":
                    description: Array of Changes
                "404":
                    $ref: '#/responses/containerNotFound'
                "500":
                    $ref: '#/responses/internalError'
            summary: Report on changes to container's filesystem; adds, deletes or modifications.
            tags:
                - containers (compat)
    /containers/{name}/exec:
        post:
            description: Create an exec session to run a command inside a running container. Exec sessions will be automatically removed 5 minutes after they exit.
            operationId: ContainerExec
            parameters:
                - description: name of container
                  in: path
                  name: name
                  required: true
                  type: string
                - description: Attributes for create
                  in: body
                  name: control
                  schema:
                    properties:
                        AttachStderr:
                            description: Attach to stderr of the exec command
                            type: boolean
                        AttachStdin:
                            description: Attach to stdin of the exec command
                            type: boolean
                        AttachStdout:
                            description: Attach to stdout of the exec command
                            type: boolean
                        Cmd:
                            description: Command to run, as a string or array of strings.
                            items:
                                type: string
                            type: array
                        DetachKeys:
                            description: |
                                "Override the key sequence for detaching a container. Format is a single character [a-Z] or ctrl-<value> where <value> is one of: a-z, @, ^, [, , or _."
                            type: string
                        Env:
                            description: A list of environment variables in the form ["VAR=value", ...]
                            items:
                                type: string
                            type: array
                        Privileged:
                            default: false
                            description: Runs the exec process with extended privileges
                            type: boolean
                        Tty:
                            description: Allocate a pseudo-TTY
                            type: boolean
                        User:
                            description: |
                                "The user, and optionally, group to run the exec process inside the container. Format is one of: user, user:group, uid, or uid:gid."
                            type: string
                        WorkingDir:
                            description: The working directory for the exec process inside the container.
                            type: string
                    type: object
            produces:
                - application/json
            responses:
                "201":
                    description: no error
                "404":
                    $ref: '#/responses/containerNotFound'
                "409":
                    description: container is paused
                "500":
                    $ref: '#/responses/internalError'
            summary: Create an exec instance
            tags:
                - exec (compat)
    /containers/{name}/export:
        get:
            description: Export the contents of a container as a tarball.
            operationId: ContainerExport
            parameters:
                - description: the name or ID of the container
                  in: path
                  name: name
                  required: true
                  type: string
            produces:
                - application/json
            responses:
                "200":
                    description: tarball is returned in body
