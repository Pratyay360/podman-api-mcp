    /libpod/exec/{id}/resize:
        post:
            description: |
                Resize the TTY session used by an exec instance. This endpoint only works if tty was specified as part of creating and starting the exec instance.
            operationId: ExecResizeLibpod
            parameters:
                - description: Exec instance ID
                  in: path
                  name: id
                  required: true
                  type: string
                - description: Height of the TTY session in characters
                  in: query
                  name: h
                  type: integer
                - description: Width of the TTY session in characters
                  in: query
                  name: w
                  type: integer
                - description: Ignore containers not running errors
                  in: query
                  name: running
                  type: boolean
            produces:
                - application/json
            responses:
                "201":
                    description: no error
                "404":
                    $ref: '#/responses/execSessionNotFound'
                "500":
                    $ref: '#/responses/internalError'
            summary: Resize an exec instance
            tags:
                - exec
    /libpod/exec/{id}/start:
        post:
            description: |
                Starts a previously set up exec instance. If detach is true, this endpoint returns immediately after starting the command.
                Otherwise, it sets up an interactive session with the command. The stream format is the same as the attach endpoint.
            operationId: ExecStartLibpod
            parameters:
                - description: Exec instance ID
                  in: path
                  name: id
                  required: true
                  type: string
                - description: Attributes for start
                  in: body
                  name: control
                  schema:
                    properties:
                        Detach:
                            description: Detach from the command.
                            type: boolean
                        Tty:
                            description: Allocate a pseudo-TTY.
                            type: boolean
                        h:
                            description: Height of the TTY session in characters. Tty must be set to true to use it.
                            type: integer
                        w:
                            description: Width of the TTY session in characters. Tty must be set to true to use it.
                            type: integer
                    type: object
            produces:
                - application/json
            responses:
                "200":
                    description: no error
                "404":
                    $ref: '#/responses/execSessionNotFound'
                "409":
                    description: container is not running.
                "500":
                    $ref: '#/responses/internalError'
            summary: Start an exec instance
            tags:
                - exec
    /libpod/generate/{name}/systemd:
        get:
            description: Generate Systemd Units based on a pod or container.
            operationId: GenerateSystemdLibpod
            parameters:
                - description: Name or ID of the container or pod.
                  in: path
                  name: name
                  required: true
                  type: string
                - default: false
                  description: Use container/pod names instead of IDs.
                  in: query
                  name: useName
                  type: boolean
                - default: false
                  description: Create a new container instead of starting an existing one.
                  in: query
                  name: new
                  type: boolean
                - default: false
                  description: Do not generate the header including the Podman version and the timestamp.
                  in: query
                  name: noHeader
                  type: boolean
                - default: 0
                  description: Start timeout in seconds.
                  in: query
                  name: startTimeout
                  type: integer
                - default: 10
                  description: Stop timeout in seconds.
                  in: query
                  name: stopTimeout
                  type: integer
                - default: on-failure
                  description: Systemd restart-policy.
                  enum:
                    - "no"
                    - on-success
                    - on-failure
                    - on-abnormal
                    - on-watchdog
                    - on-abort
                    - always
                  in: query
                  name: restartPolicy
                  type: string
                - default: container
                  description: Systemd unit name prefix for containers.
                  in: query
                  name: containerPrefix
                  type: string
                - default: pod
                  description: Systemd unit name prefix for pods.
                  in: query
                  name: podPrefix
                  type: string
                - default: '-'
                  description: Systemd unit name separator between name/id and prefix.
                  in: query
                  name: separator
                  type: string
                - default: 0
                  description: Configures the time to sleep before restarting a service.
                  in: query
                  name: restartSec
                  type: integer
                - default: []
                  description: Systemd Wants list for the container or pods.
                  in: query
                  items:
                    type: string
                  name: wants
                  type: array
                - default: []
                  description: Systemd After list for the container or pods.
                  in: query
                  items:
                    type: string
                  name: after
                  type: array
                - default: []
                  description: Systemd Requires list for the container or pods.
                  in: query
                  items:
                    type: string
                  name: requires
                  type: array
                - default: []
                  description: Set environment variables to the systemd unit files.
                  in: query
                  items:
                    type: string
                  name: additionalEnvVariables
                  type: array
                - default: false
                  description: Add template specifier for the systemd unit file names.
                  in: query
                  name: templateUnitFile
                  type: boolean
            produces:
                - application/json
            responses:
                "200":
                    description: no error
                    schema:
                        additionalProperties:
                            type: string
                        type: object
                "500":
                    $ref: '#/responses/internalError'
            summary: Generate Systemd Units
            tags:
                - containers
                - pods
    /libpod/generate/kube:
        get:
            description: Generate Kubernetes YAML based on a pod or container.
            operationId: GenerateKubeLibpod
            parameters:
                - description: Name or ID of the container or pod.
                  in: query
                  items:
                    type: string
                  name: names
                  required: true
                  type: array
                - default: false
                  description: Generate YAML for a Kubernetes service object.
                  in: query
                  name: service
                  type: boolean
                - default: pod
                  description: Generate YAML for the given Kubernetes kind.
                  in: query
                  name: type
                  type: string
                - default: 0
                  description: Set the replica number for Deployment kind.
                  format: int32
                  in: query
                  name: replicas
                  type: integer
                - default: false
                  description: don't truncate annotations to the Kubernetes maximum length of 63 characters
                  in: query
                  name: noTrunc
                  type: boolean
                - default: false
                  description: add podman-only reserved annotations in generated YAML file (cannot be used by Kubernetes)
                  in: query
                  name: podmanOnly
                  type: boolean
            produces:
                - text/vnd.yaml
                - application/json
            responses:
                "200":
                    description: Kubernetes YAML file describing pod
                    schema:
                        format: binary
                        type: string
                "500":
                    $ref: '#/responses/internalError'
            summary: Generate a Kubernetes YAML file.
            tags:
                - containers
                - pods
    /libpod/images/{name}:
        delete:
            description: Remove an image from the local storage.
            operationId: ImageDeleteLibpod
            parameters:
                - description: name or ID of image to remove
                  in: path
                  name: name
                  required: true
                  type: string
                - description: remove the image even if used by containers or has other tags
                  in: query
                  name: force
                  type: boolean
                - default: false
                  description: Ignore if a specified image does not exist and do not throw an error.
                  in: query
                  name: ignore
                  type: boolean
                - description: Resolve to a manifest list instead of an image.
                  in: query
                  name: lookupManifest
                  type: boolean
            produces:
                - application/json
            responses:
                "200":
                    $ref: '#/responses/imagesRemoveResponseLibpod'
                "400":
                    $ref: '#/responses/badParamError'
                "404":
                    $ref: '#/responses/imageNotFound'
                "409":
                    $ref: '#/responses/conflictError'
                "500":
                    $ref: '#/responses/internalError'
            summary: Remove an image from the local storage.
            tags:
                - images
    /libpod/images/{name}/changes:
        get:
            description: |
                Returns which files in an image's filesystem have been added, deleted, or modified. The Kind of modification can be one of:

                0: Modified
                1: Added
                2: Deleted
            operationId: ImageChangesLibpod
            parameters:
                - description: the name or id of the image
                  in: path
                  name: name
                  required: true
                  type: string
                - description: specify a second layer which is used to compare against it instead of the parent layer
                  in: query
                  name: parent
                  type: string
                - description: select what you want to match, default is all
                  enum:
                    - all
                    - container
                    - image
                  in: query
                  name: diffType
                  type: string
            responses:
                "200":
                    description: Array of Changes
                "404":
                    $ref: '#/responses/containerNotFound'
                "500":
                    $ref: '#/responses/internalError'
            summary: Report on changes to images's filesystem; adds, deletes or modifications.
            tags:
                - images
    /libpod/images/{name}/exists:
        get:
            description: Check if image exists in local store
            operationId: ImageExistsLibpod
            parameters:
                - description: the name or ID of the container
                  in: path
                  name: name
                  required: true
                  type: string
            produces:
                - application/json
            responses:
                "204":
                    description: image exists
                "404":
                    $ref: '#/responses/imageNotFound'
                "500":
                    $ref: '#/responses/internalError'
            summary: Image exists
            tags:
                - images
    /libpod/images/{name}/get:
        get:
            description: Export an image
            operationId: ImageGetLibpod
            parameters:
                - description: the name or ID of the container
                  in: path
                  name: name
                  required: true
                  type: string
                - description: format for exported image
                  in: query
                  name: format
                  type: string
                - description: use compression on image
                  in: query
                  name: compress
                  type: boolean
            produces:
                - application/x-tar
            responses:
                "200":
                    description: no error
                    schema:
                        format: binary
                        type: string
                "404":
                    $ref: '#/responses/imageNotFound'
                "500":
                    $ref: '#/responses/internalError'
            summary: Export an image
            tags:
                - images
    /libpod/images/{name}/history:
        get:
            description: Return parent layers of an image.
            operationId: ImageHistoryLibpod
            parameters:
                - description: the name or ID of the container
                  in: path
                  name: name
                  required: true
                  type: string
            produces:
                - application/json
            responses:
                "200":
                    $ref: '#/responses/history'
                "404":
                    $ref: '#/responses/imageNotFound'
                "500":
                    $ref: '#/responses/internalError'
            summary: History of an image
            tags:
                - images
    /libpod/images/{name}/json:
        get:
            description: Obtain low-level information about an image
            operationId: ImageInspectLibpod
            parameters:
                - description: the name or ID of the container
                  in: path
                  name: name
                  required: true
                  type: string
            produces:
                - application/json
            responses:
                "200":
                    $ref: '#/responses/inspectImageResponseLibpod'
                "404":
                    $ref: '#/responses/imageNotFound'
                "500":
                    $ref: '#/responses/internalError'
            summary: Inspect an image
            tags:
                - images
    /libpod/images/{name}/push:
        post:
            description: Push an image to a container registry
            operationId: ImagePushLibpod
            parameters:
                - description: Name of image to push.
                  in: path
                  name: name
                  required: true
                  type: string
                - description: Allows for pushing the image to a different destination than the image refers to.
                  in: query
                  name: destination
                  type: string
                - default: false
                  description: Enforce compressing the layers with the specified --compression and do not reuse differently compressed blobs on the registry.
                  in: query
                  name: forceCompressionFormat
                  type: boolean
                - description: Compression format used to compress image layers.
                  in: query
                  name: compressionFormat
                  type: string
                - description: Compression level used to compress image layers.
                  in: query
                  name: compressionLevel
                  type: integer
                - default: true
                  description: Require TLS verification.
                  in: query
                  name: tlsVerify
                  type: boolean
                - default: true
                  description: Silences extra stream data on push.
                  in: query
                  name: quiet
                  type: boolean
                - description: Manifest type (oci, v2s1, or v2s2) to use when pushing an image. Default is manifest type of source, with fallbacks.
                  in: query
                  name: format
                  type: string
                - description: All indicates whether to push all images related to the image list.
                  in: query
                  name: all
                  type: boolean
                - description: Discard any pre-existing signatures in the image.
                  in: query
                  name: removeSignatures
                  type: boolean
                - description: Number of times to retry push in case of failure.
                  in: query
                  name: retry
                  type: integer
                - description: Delay between retries in case of push failures. Duration format such as "412ms", or "3.5h".
                  in: query
                  name: retryDelay
                  type: string
                - description: A base64-encoded auth configuration.
                  in: header
                  name: X-Registry-Auth
                  type: string
            produces:
                - application/json
            responses:
                "200":
                    description: no error
                    schema:
                        format: binary
                        type: string
                "404":
                    $ref: '#/responses/imageNotFound'
                "500":
                    $ref: '#/responses/internalError'
            summary: Push Image
            tags:
                - images
    /libpod/images/{name}/resolve:
        get:
            description: Resolve the passed image name to a list of fully-qualified images referring to container registries.
            operationId: ImageResolveLibpod
            parameters:
                - description: the (short) name to resolve
                  in: path
                  name: name
                  required: true
                  type: string
            produces:
                - application/json
            responses:
                "204":
                    description: resolved image names
                "400":
                    $ref: '#/responses/badParamError'
                "500":
                    $ref: '#/responses/internalError'
            summary: Resolve an image (short) name
            tags:
                - images
    /libpod/images/{name}/tag:
        post:
            description: Tag an image so that it becomes part of a repository.
            operationId: ImageTagLibpod
            parameters:
                - description: the name or ID of the container
                  in: path
                  name: name
                  required: true
                  type: string
                - description: the repository to tag in
                  in: query
                  name: repo
                  type: string
                - description: the name of the new tag
                  in: query
                  name: tag
                  type: string
            produces:
                - application/json
            responses:
                "201":
                    description: no error
                "400":
                    $ref: '#/responses/badParamError'
                "404":
                    $ref: '#/responses/imageNotFound'
                "409":
                    $ref: '#/responses/conflictError'
                "500":
                    $ref: '#/responses/internalError'
            summary: Tag an image
            tags:
                - images
    /libpod/images/{name}/tree:
        get:
            description: Retrieve the image tree for the provided image name or ID
            operationId: ImageTreeLibpod
            parameters:
                - description: the name or ID of the container
                  in: path
                  name: name
                  required: true
                  type: string
                - description: show all child images and layers of the specified image
                  in: query
                  name: whatrequires
                  type: boolean
            produces:
                - application/json
            responses:
                "200":
                    $ref: '#/responses/treeResponse'
                "404":
                    $ref: '#/responses/imageNotFound'
                "500":
                    $ref: '#/responses/internalError'
            summary: Image tree
            tags:
                - images
    /libpod/images/{name}/untag:
        post:
            description: Untag an image. If not repo and tag are specified, all tags are removed from the image.
            operationId: ImageUntagLibpod
            parameters:
                - description: the name or ID of the container
                  in: path
                  name: name
                  required: true
                  type: string
                - description: the repository to untag
                  in: query
                  name: repo
                  type: string
                - description: the name of the tag to untag
                  in: query
                  name: tag
                  type: string
            produces:
                - application/json
            responses:
                "201":
                    description: no error
                "400":
                    $ref: '#/responses/badParamError'
                "404":
                    $ref: '#/responses/imageNotFound'
                "409":
                    $ref: '#/responses/conflictError'
                "500":
                    $ref: '#/responses/internalError'
            summary: Untag an image
            tags:
                - images
    /libpod/images/export:
        get:
            description: Export multiple images into a single object. Only `docker-archive` is currently supported.
            operationId: ImageExportLibpod
            parameters:
                - description: format for exported image (only docker-archive is supported)
                  in: query
                  name: format
                  type: string
                - description: references to images to export
                  in: query
                  items:
                    type: string
                  name: references
                  type: array
                - description: use compression on image
                  in: query
                  name: compress
                  type: boolean
                - description: accept uncompressed layers when copying OCI images
                  in: query
                  name: ociAcceptUncompressedLayers
                  type: boolean
            produces:
                - application/json
            responses:
                "200":
                    description: no error
                    schema:
                        format: binary
                        type: string
                "404":
                    $ref: '#/responses/imageNotFound'
                "500":
                    $ref: '#/responses/internalError'
            summary: Export multiple images
            tags:
                - images
    /libpod/images/import:
        post:
            consumes:
                - application/x-tar
            description: Import a previously exported tarball as an image.
            operationId: ImageImportLibpod
            parameters:
                - default: application/x-tar
                  enum:
                    - application/x-tar
                  in: header
                  name: Content-Type
                  type: string
                - description: 'Apply the following possible instructions to the created image: CMD | ENTRYPOINT | ENV | EXPOSE | LABEL | STOPSIGNAL | USER | VOLUME | WORKDIR.  JSON encoded string'
                  in: query
                  items:
                    type: string
                  name: changes
                  type: array
                - description: Set commit message for imported image
                  in: query
                  name: message
                  type: string
                - description: Optional Name[:TAG] for the image
                  in: query
                  name: reference
                  type: string
                - description: Load image from the specified URL
                  in: query
                  name: url
                  type: string
                - description: tarball for imported image
                  in: body
                  name: upload
                  required: true
                  schema:
                    format: binary
                    type: string
            produces:
                - application/json
            responses:
                "200":
                    $ref: '#/responses/imagesImportResponseLibpod'
                "400":
                    $ref: '#/responses/badParamError'
                "500":
                    $ref: '#/responses/internalError'
            summary: Import image
            tags:
                - images
    /libpod/images/json:
        get:
            description: Returns a list of images on the server
            operationId: ImageListLibpod
            parameters:
                - default: false
                  description: Show all images. Only images from a final layer (no children) are shown by default.
                  in: query
                  name: all
                  type: boolean
                - description: |
                    JSON-encoded string containing filters as a `map[string][]string` to process on the images list. Available filters:
                    - `before`=(`<image-name>[:<tag>]`,  `<image id>` or `<image@digest>`)
                    - `dangling=true`
                    - `label=key` or `label="key=value"` of an image label
                    - `reference`=(`<image-name>[:<tag>]`)
                    - `id`=(`<image-id>`)
                    - `since`=(`<image-name>[:<tag>]`,  `<image id>` or `<image@digest>`)
                  in: query
                  name: filters
                  type: string
            produces:
                - application/json
            responses:
                "200":
                    $ref: '#/responses/imageListLibpod'
                "500":
                    $ref: '#/responses/internalError'
            summary: List Images
            tags:
                - images
    /libpod/images/load:
        post:
            consumes:
                - application/x-tar
            description: Load an image (oci-archive or docker-archive) stream.
            operationId: ImageLoadLibpod
            parameters:
                - description: tarball of container image
                  in: body
                  name: upload
                  required: true
                  schema:
                    type: string
            produces:
                - application/json
            responses:
                "200":
                    $ref: '#/responses/imagesLoadResponseLibpod'
                "400":
                    $ref: '#/responses/badParamError'
                "500":
                    $ref: '#/responses/internalError'
            summary: Load image
            tags:
                - images
    /libpod/images/prune:
        post:
            description: Remove images that are not being used by a container
            operationId: ImagePruneLibpod
            parameters:
                - default: false
                  description: |
                    Remove all images not in use by containers, not just dangling ones
                  in: query
                  name: all
                  type: boolean
                - default: false
                  description: |
                    Remove images even when they are used by external containers (e.g, by build containers)
                  in: query
                  name: external
                  type: boolean
                - default: false
                  description: |
                    Remove persistent build cache created by build instructions such as `--mount=type=cache`.
                  in: query
                  name: buildcache
                  type: boolean
                - description: |
                    filters to apply to image pruning, encoded as JSON (map[string][]string). Available filters:
                      - `dangling=<boolean>` When set to `true` (or `1`), prune only
                         unused *and* untagged images. When set to `false`
                         (or `0`), all unused images are pruned.
                      - `until=<string>` Prune images created before this timestamp. The `<timestamp>` can be Unix timestamps, date formatted timestamps, or Go duration strings (e.g. `10m`, `1h30m`) computed relative to the daemon machine’s time.
                      - `label` (`label=<key>`, `label=<key>=<value>`, `label!=<key>`, or `label!=<key>=<value>`) Prune images with (or without, in case `label!=...` is used) the specified labels.
                  in: query
                  name: filters
                  type: string
            produces:
                - application/json
            responses:
                "200":
                    $ref: '#/responses/imagesPruneLibpod'
                "500":
                    $ref: '#/responses/internalError'
            summary: Prune unused images
            tags:
                - images
    /libpod/images/pull:
        post:
            description: Pull one or more images from a container registry. Error status codes can come either from the API or from the registry. Errors may be detected later even if the HTTP status 200 is returned, and in that case, the error description will be in the `error` field.
            operationId: ImagePullLibpod
            parameters:
                - description: Mandatory reference to the image (e.g., quay.io/image/name:tag)
                  in: query
                  name: reference
                  type: string
                - default: false
                  description: Silence extra stream data on pull. Cannot be used with 'compatMode' or 'pullProgress'.
                  in: query
                  name: quiet
                  type: boolean
                - default: false
                  description: Return the same JSON payload as the Docker-compat endpoint. Cannot be used with 'pullProgress' or 'quiet'.
                  in: query
                  name: compatMode
                  type: boolean
                - default: false
                  description: Send reports about the progress of the pull. Cannot be used with 'compatMode' or 'quiet'.
                  in: query
                  name: pullProgress
                  type: boolean
                - description: Pull image for the specified architecture.
                  in: query
                  name: Arch
                  type: string
                - description: Pull image for the specified operating system.
                  in: query
                  name: OS
                  type: string
                - description: Pull image for the specified variant.
                  in: query
                  name: Variant
                  type: string
                - description: Pull policy, "always" (default), "missing", "newer", "never".
                  in: query
                  name: policy
                  type: string
                - default: true
                  description: Require TLS verification.
                  in: query
                  name: tlsVerify
                  type: boolean
                - description: Pull all tagged images in the repository.
                  in: query
                  name: allTags
                  type: boolean
                - description: 'base-64 encoded auth config. Must include the following four values: username, password, email and server address OR simply just an identity token.'
                  in: header
                  name: X-Registry-Auth
                  type: string
            produces:
                - application/json
            responses:
                "200":
                    $ref: '#/responses/imagesPullResponseLibpod'
                "400":
                    $ref: '#/responses/badParamError'
                "500":
                    $ref: '#/responses/internalError'
                default:
                    $ref: '#/responses/errorFromRegistry'
            summary: Pull images
            tags:
                - images
    /libpod/images/remove:
        delete:
            description: Remove one or more images from the storage.
            operationId: ImageDeleteAllLibpod
            parameters:
                - description: Images IDs or names to remove.
                  in: query
                  items:
                    type: string
                  name: images
                  type: array
                - default: true
                  description: Remove all images.
                  in: query
                  name: all
                  type: boolean
                - description: Force image removal (including containers using the images).
                  in: query
                  name: force
                  type: boolean
                - description: Ignore if a specified image does not exist and do not throw an error.
                  in: query
                  name: ignore
                  type: boolean
                - description: Resolves to manifest list instead of image.
                  in: query
                  name: lookupManifest
                  type: boolean
            produces:
                - application/json
            responses:
                "200":
                    $ref: '#/responses/imagesRemoveResponseLibpod'
                "400":
                    $ref: '#/responses/badParamError'
                "500":
                    $ref: '#/responses/internalError'
            summary: Remove one or more images from the storage.
            tags:
                - images
    /libpod/images/scp/{name}:
        post:
            description: Copy an image from one host to another
            operationId: ImageScpLibpod
            parameters:
                - description: source connection/image
                  in: path
                  name: name
                  required: true
                  type: string
                - description: dest connection/image
                  in: query
                  name: destination
                  type: string
                - default: false
                  description: quiet output
                  in: query
                  name: quiet
                  type: boolean
            produces:
                - application/json
            responses:
                "200":
                    $ref: '#/responses/imagesScpResponseLibpod'
                "400":
                    $ref: '#/responses/badParamError'
                "500":
                    $ref: '#/responses/internalError'
            summary: Copy an image from one host to another
            tags:
                - images
    /libpod/images/search:
        get:
            description: Search registries for images
            operationId: ImageSearchLibpod
            parameters:
                - description: term to search
                  in: query
                  name: term
                  type: string
                - default: 25
                  description: maximum number of results
                  in: query
                  name: limit
                  type: integer
                - description: |
                    JSON-encoded string containing filters as a `map[string][]string` to process on the images list. Available filters:
                    - `is-automated=(true|false)`
                    - `is-official=(true|false)`
                    - `stars=<number>` Matches images that have at least 'number' stars.
                  in: query
                  name: filters
                  type: string
                - default: true
                  description: Require HTTPS and verify signatures when contacting registries.
                  in: query
                  name: tlsVerify
                  type: boolean
                - default: false
                  description: list the available tags in the repository
                  in: query
                  name: listTags
                  type: boolean
            produces:
                - application/json
            responses:
                "200":
                    $ref: '#/responses/registrySearchResponse'
                "500":
                    $ref: '#/responses/internalError'
            summary: Search images
            tags:
                - images
    /libpod/info:
        get:
            description: Returns information on the system and libpod configuration
            operationId: SystemInfoLibpod
            produces:
                - application/json
            responses:
                "200":
                    $ref: '#/responses/infoResponse'
                "500":
                    $ref: '#/responses/internalError'
            summary: Get info
