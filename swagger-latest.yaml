                - containers (compat)
    /containers/json:
        get:
            description: Returns a list of containers
            operationId: ContainerList
            parameters:
                - default: false
                  description: Return all containers. By default, only running containers are shown
                  in: query
                  name: all
                  type: boolean
                - default: false
                  description: Return containers in storage not controlled by Podman
                  in: query
                  name: external
                  type: boolean
                - description: Return this number of most recently created containers, including non-running ones.
                  in: query
                  name: limit
                  type: integer
                - default: false
                  description: Return the size of container as fields SizeRw and SizeRootFs.
                  in: query
                  name: size
                  type: boolean
                - description: |
                    A JSON encoded value of the filters (a `map[string][]string`) to process on the containers list. Available filters:
                    - `ancestor`=(`<image-name>[:<tag>]`, `<image id>`, or `<image@digest>`)
                    - `before`=(`<container id>` or `<container name>`)
                    - `expose`=(`<port>[/<proto>]` or `<startport-endport>/[<proto>]`)
                    - `exited=<int>` containers with exit code of `<int>`
                    - `health`=(`starting`, `healthy`, `unhealthy` or `none`)
                    - `id=<ID>` a container's ID
                    - `is-task`=(`true` or `false`)
                    - `label`=(`key` or `"key=value"`) of a container label
                    - `name=<name>` a container's name
                    - `network`=(`<network id>` or `<network name>`)
                    - `publish`=(`<port>[/<proto>]` or `<startport-endport>/[<proto>]`)
                    - `since`=(`<container id>` or `<container name>`)
                    - `status`=(`created`, `restarting`, `running`, `removing`, `paused`, `exited` or `dead`)
                    - `volume`=(`<volume name>` or `<mount point destination>`)
                  in: query
                  name: filters
                  type: string
            produces:
                - application/json
            responses:
                "200":
                    $ref: '#/responses/containersList'
                "400":
                    $ref: '#/responses/badParamError'
                "500":
                    $ref: '#/responses/internalError'
            summary: List containers
            tags:
                - containers (compat)
    /containers/prune:
        post:
            description: Remove containers not in use
            operationId: ContainerPrune
            parameters:
                - description: |
                    Filters to process on the prune list, encoded as JSON (a `map[string][]string`).  Available filters:
                     - `until=<timestamp>` Prune containers created before this timestamp. The `<timestamp>` can be Unix timestamps, date formatted timestamps, or Go duration strings (e.g. `10m`, `1h30m`) computed relative to the daemon machine’s time.
                     - `label` (`label=<key>`, `label=<key>=<value>`, `label!=<key>`, or `label!=<key>=<value>`) Prune containers with (or without, in case `label!=...` is used) the specified labels.
                  in: query
                  name: filters
                  type: string
            produces:
                - application/json
            responses:
                "200":
                    $ref: '#/responses/containersPrune'
                "500":
                    $ref: '#/responses/internalError'
            summary: Delete stopped containers
            tags:
                - containers (compat)
    /events:
        get:
            description: Returns events filtered on query parameters
            operationId: SystemEvents
            parameters:
                - description: start streaming events from this time
                  in: query
                  name: since
                  type: string
                - description: stop streaming events later than this
                  in: query
                  name: until
                  type: string
                - description: JSON encoded map[string][]string of constraints
                  in: query
                  name: filters
                  type: string
            produces:
                - application/json
            responses:
                "200":
                    description: returns a string of json data describing an event
                "500":
                    $ref: '#/responses/internalError'
            summary: Get events
            tags:
                - system (compat)
    /exec/{id}/json:
        get:
            description: Return low-level information about an exec instance.
            operationId: ExecInspect
            parameters:
                - description: Exec instance ID
                  in: path
                  name: id
                  required: true
                  type: string
            produces:
                - application/json
            responses:
                "200":
                    $ref: '#/responses/execSessionInspect'
                "404":
                    $ref: '#/responses/execSessionNotFound'
                "500":
                    $ref: '#/responses/internalError'
            summary: Inspect an exec instance
            tags:
                - exec (compat)
    /exec/{id}/resize:
        post:
            description: |
                Resize the TTY session used by an exec instance. This endpoint only works if tty was specified as part of creating and starting the exec instance.
            operationId: ExecResize
            parameters:
                - description: Exec instance ID
                  in: path
                  name: id
                  required: true
                  type: string
                - description: Height of the TTY session in characters
                  in: query
                  name: h
                  type: integer
                - description: Width of the TTY session in characters
                  in: query
                  name: w
                  type: integer
                - description: Ignore containers not running errors
                  in: query
                  name: running
                  type: boolean
            produces:
                - application/json
            responses:
                "201":
                    description: no error
                "404":
                    $ref: '#/responses/execSessionNotFound'
                "500":
                    $ref: '#/responses/internalError'
            summary: Resize an exec instance
            tags:
                - exec (compat)
    /exec/{id}/start:
        post:
            description: Starts a previously set up exec instance. If detach is true, this endpoint returns immediately after starting the command. Otherwise, it sets up an interactive session with the command.
            operationId: ExecStart
            parameters:
                - description: Exec instance ID
                  in: path
                  name: id
                  required: true
                  type: string
                - description: Attributes for start
                  in: body
                  name: control
                  schema:
                    properties:
                        Detach:
                            description: Detach from the command. Not presently supported.
                            type: boolean
                        Tty:
                            description: Allocate a pseudo-TTY. Presently ignored.
                            type: boolean
                    type: object
            produces:
                - application/octet-stream
            responses:
                "200":
                    description: no error
                "404":
                    $ref: '#/responses/execSessionNotFound'
                "409":
                    description: container is not running
                "500":
                    $ref: '#/responses/internalError'
            summary: Start an exec instance
            tags:
                - exec (compat)
    /images/{name}:
        delete:
            description: Delete an image from local storage
            operationId: ImageDelete
            parameters:
                - description: name or ID of image to delete
                  in: path
                  name: name
                  required: true
                  type: string
                - description: Remove the image even if it is being used by stopped containers or has other tags
                  in: query
                  name: force
                  type: boolean
                - description: do not remove dangling parent images
                  in: query
                  name: noprune
                  type: boolean
                - default: false
                  description: Ignore if a specified image does not exist and do not throw an error.
                  in: query
                  name: ignore
                  type: boolean
            produces:
                - application/json
            responses:
                "200":
                    $ref: '#/responses/imageDeleteResponse'
                "404":
                    $ref: '#/responses/imageNotFound'
                "409":
                    $ref: '#/responses/conflictError'
                "500":
                    $ref: '#/responses/internalError'
            summary: Remove Image
            tags:
                - images (compat)
    /images/{name}/get:
        get:
            description: Export an image in tarball format
            operationId: ImageGet
            parameters:
                - description: the name or ID of the container
                  in: path
                  name: name
                  required: true
                  type: string
            produces:
                - application/x-tar
            responses:
                "200":
                    description: no error
                    schema:
                        format: binary
                        type: string
                "500":
                    $ref: '#/responses/internalError'
            summary: Export an image
            tags:
                - images (compat)
    /images/{name}/history:
        get:
            description: Return parent layers of an image.
            operationId: ImageHistory
            parameters:
                - description: the name or ID of the container
                  in: path
                  name: name
                  required: true
                  type: string
            produces:
                - application/json
            responses:
                "200":
                    $ref: '#/responses/history'
                "404":
                    $ref: '#/responses/imageNotFound'
                "500":
                    $ref: '#/responses/internalError'
            summary: History of an image
            tags:
                - images (compat)
    /images/{name}/json:
        get:
            description: Return low-level information about an image.
            operationId: ImageInspect
            parameters:
                - description: the name or ID of the container
                  in: path
                  name: name
                  required: true
                  type: string
            produces:
                - application/json
            responses:
                "200":
                    $ref: '#/responses/imageInspect'
                "404":
                    $ref: '#/responses/imageNotFound'
                "500":
                    $ref: '#/responses/internalError'
            summary: Inspect an image
            tags:
                - images (compat)
    /images/{name}/push:
        post:
            description: Push an image to a container registry
            operationId: ImagePush
            parameters:
                - description: Name of image to push.
                  in: path
                  name: name
                  required: true
                  type: string
                - description: The tag to associate with the image on the registry.
                  in: query
                  name: tag
                  type: string
                - description: All indicates whether to push all images related to the image list
                  in: query
                  name: all
                  type: boolean
                - description: Use compression on image.
                  in: query
                  name: compress
                  type: boolean
                - description: Allows for pushing the image to a different destination than the image refers to.
                  in: query
                  name: destination
                  type: string
                - description: Manifest type (oci, v2s1, or v2s2) to use when pushing an image. Default is manifest type of source, with fallbacks.
                  in: query
                  name: format
                  type: string
                - default: true
                  description: Require TLS verification.
                  in: query
                  name: tlsVerify
                  type: boolean
                - description: A base64-encoded auth configuration.
                  in: header
                  name: X-Registry-Auth
                  type: string
            produces:
                - application/json
            responses:
                "200":
                    description: no error
                    schema:
                        format: binary
                        type: string
                "404":
                    $ref: '#/responses/imageNotFound'
                "500":
                    $ref: '#/responses/internalError'
            summary: Push Image
            tags:
                - images (compat)
    /images/{name}/tag:
        post:
            description: Tag an image so that it becomes part of a repository.
            operationId: ImageTag
            parameters:
                - description: the name or ID of the container
                  in: path
                  name: name
                  required: true
                  type: string
                - description: the repository to tag in
                  in: query
                  name: repo
                  type: string
                - description: the name of the new tag
                  in: query
                  name: tag
                  type: string
            produces:
                - application/json
            responses:
                "201":
                    description: no error
                "400":
                    $ref: '#/responses/badParamError'
                "404":
                    $ref: '#/responses/imageNotFound'
                "409":
                    $ref: '#/responses/conflictError'
                "500":
                    $ref: '#/responses/internalError'
            summary: Tag an image
            tags:
                - images (compat)
    /images/create:
        post:
            consumes:
                - text/plain
                - application/octet-stream
            description: Create an image by either pulling it from a registry or importing it.
            operationId: ImageCreate
            parameters:
                - description: A base64-encoded auth configuration.
                  in: header
                  name: X-Registry-Auth
                  type: string
                - description: Name of the image to pull. The name may include a tag or digest. This parameter may only be used when pulling an image. The pull is cancelled if the HTTP connection is closed.
                  in: query
                  name: fromImage
                  type: string
                - description: Source to import. The value may be a URL from which the image can be retrieved or - to read the image from the request body. This parameter may only be used when importing an image
                  in: query
                  name: fromSrc
                  type: string
                - description: Repository name given to an image when it is imported. The repo may include a tag. This parameter may only be used when importing an image.
                  in: query
                  name: repo
                  type: string
                - description: Tag or digest. If empty when pulling an image, this causes all tags for the given image to be pulled.
                  in: query
                  name: tag
                  type: string
                - description: Set commit message for imported image.
                  in: query
                  name: message
                  type: string
                - description: Platform in the format os[/arch[/variant]]
                  in: query
                  name: platform
                  type: string
                - description: Number of times to retry in case of failure when performing pull.
                  in: query
                  name: retry
                  type: integer
                - description: Delay between retries in case of pull failures.
                  in: query
                  name: retryDelay
                  type: string
                - description: Image content if fromSrc parameter was used
                  in: body
                  name: inputImage
                  schema:
                    format: binary
                    type: string
            produces:
                - application/json
            responses:
                "200":
                    description: no error
                    schema:
                        format: binary
                        type: string
                "404":
                    $ref: '#/responses/imageNotFound'
                "500":
                    $ref: '#/responses/internalError'
            summary: Create an image
            tags:
                - images (compat)
    /images/get:
        get:
            description: Get a tarball containing all images and metadata for several image repositories
            operationId: ImageGetAll
            parameters:
                - description: one or more image names or IDs comma separated
                  in: query
                  name: names
                  required: true
                  type: string
            produces:
                - application/json
            responses:
                "200":
                    description: no error
                    schema:
                        format: binary
                        type: string
                "500":
                    $ref: '#/responses/internalError'
            summary: Export several images
            tags:
                - images (compat)
    /images/json:
        get:
            description: Returns a list of images on the server. Note that it uses a different, smaller representation of an image than inspecting a single image.
            operationId: ImageList
            parameters:
                - default: false
                  description: Show all images. Only images from a final layer (no children) are shown by default.
                  in: query
                  name: all
                  type: boolean
                - description: |
                    JSON-encoded string containing filters as a `map[string][]string` to process on the images list. Available filters:
                    - `before`=(`<image-name>[:<tag>]`,  `<image id>` or `<image@digest>`)
                    - `dangling=true`
                    - `label=key` or `label="key=value"` of an image label
                    - `reference`=(`<image-name>[:<tag>]`)
                    - `since`=(`<image-name>[:<tag>]`,  `<image id>` or `<image@digest>`)
                  in: query
                  name: filters
                  type: string
                - default: false
                  description: Not supported
                  in: query
                  name: digests
                  type: boolean
                - default: false
                  description: Compute and show shared size as a SharedSize field on each image.
                  in: query
                  name: shared-size
                  type: boolean
            produces:
                - application/json
            responses:
                "200":
                    $ref: '#/responses/imageList'
                "500":
                    $ref: '#/responses/internalError'
            summary: List Images
            tags:
                - images (compat)
    /images/load:
        post:
            description: Load a set of images and tags into a repository.
            operationId: ImageLoad
            parameters:
                - description: not supported
                  in: query
                  name: quiet
                  type: boolean
                - description: tarball of container image
                  in: body
                  name: request
                  schema:
                    type: string
            produces:
                - application/json
            responses:
                "200":
                    description: no error
                "500":
                    $ref: '#/responses/internalError'
            summary: Import image
            tags:
                - images (compat)
    /images/prune:
        post:
            description: Remove images from local storage that are not being used by a container
            operationId: ImagePrune
            parameters:
                - description: |
                    filters to apply to image pruning, encoded as JSON (map[string][]string). Available filters:
                      - `dangling=<boolean>` When set to `true` (or `1`), prune only
                         unused *and* untagged images. When set to `false`
                         (or `0`), all unused images are pruned.
                      - `until=<string>` Prune images created before this timestamp. The `<timestamp>` can be Unix timestamps, date formatted timestamps, or Go duration strings (e.g. `10m`, `1h30m`) computed relative to the daemon machine’s time.
                      - `label` (`label=<key>`, `label=<key>=<value>`, `label!=<key>`, or `label!=<key>=<value>`) Prune images with (or without, in case `label!=...` is used) the specified labels.
                  in: query
                  name: filters
                  type: string
            produces:
                - application/json
            responses:
                "200":
                    $ref: '#/responses/imageDeleteResponse'
                "500":
                    $ref: '#/responses/internalError'
            summary: Prune unused images
            tags:
                - images (compat)
    /images/search:
        get:
            description: Search registries for an image
            operationId: ImageSearch
            parameters:
                - description: term to search
                  in: query
                  name: term
                  type: string
                - default: 25
                  description: maximum number of results
                  in: query
                  name: limit
                  type: integer
                - description: |
                    JSON-encoded string containing filters as a `map[string][]string` to process on the images list. Available filters:
                    - `is-automated=(true|false)`
                    - `is-official=(true|false)`
                    - `stars=<number>` Matches images that have at least 'number' stars.
                  in: query
                  name: filters
                  type: string
                - default: true
                  description: Require HTTPS and verify signatures when contacting registries.
                  in: query
                  name: tlsVerify
                  type: boolean
                - description: list the available tags in the repository
                  in: query
                  name: listTags
                  type: boolean
            produces:
                - application/json
            responses:
                "200":
                    $ref: '#/responses/registrySearchResponse'
                "400":
                    $ref: '#/responses/badParamError'
                "500":
                    $ref: '#/responses/internalError'
            summary: Search images
            tags:
                - images (compat)
    /info:
        get:
            description: Returns information on the system and libpod configuration
            operationId: SystemInfo
            produces:
                - application/json
            responses:
                "200":
                    description: to be determined
                "500":
                    $ref: '#/responses/internalError'
            summary: Get info
            tags:
                - system (compat)
    /libpod/_ping:
        get:
            description: |
                Return protocol information in response headers.
                `HEAD /libpod/_ping` is also supported.
                `/_ping` is available for compatibility with other engines.
                The '_ping' endpoints are not versioned.
            operationId: SystemPing
            produces:
                - text/plain
            responses:
                "200":
                    description: Success
                    headers:
                        API-Version:
                            description: Max compatibility API Version the server supports
                            type: string
                        BuildKit-Version:
                            description: Default version of docker image builder
                            type: string
                        Cache-Control:
                            description: always no-cache
                            type: string
                        Docker-Experimental:
                            description: If the server is running with experimental mode enabled, always true
                            type: boolean
                        Libpod-API-Version:
                            description: |
                                Max Podman API Version the server supports.
                                Available if service is backed by Podman, therefore may be used to
                                determine if talking to Podman engine or another engine
                            type: string
                        Libpod-Buildah-Version:
                            description: |
                                Default version of libpod image builder.
                                  Available if service is backed by Podman, therefore may be used to
                                  determine if talking to Podman engine or another engine
                            type: string
                        Pragma:
                            description: always no-cache
                            type: string
                    schema:
                        description: OK
                        example: OK
                        type: string
                "500":
                    $ref: '#/responses/internalError'
            summary: Ping service
            tags:
                - system (compat)
                - system
    /libpod/artifacts/{name}:
        delete:
            description: Remove a single artifact from local storage by name or ID.
            operationId: ArtifactDeleteLibpod
            parameters:
                - description: Name or ID of the artifact to remove
                  in: path
                  name: name
                  required: true
                  type: string
            produces:
                - application/json
            responses:
                "200":
                    $ref: '#/responses/artifactRemoveResponse'
                "404":
                    $ref: '#/responses/artifactNotFound'
                "500":
                    $ref: '#/responses/internalError'
            summary: Remove an artifact
            tags:
                - artifacts
    /libpod/artifacts/{name}/extract:
        get:
            description: Extract the files of an OCI artifact to the local filesystem as a tar archive.
            operationId: ArtifactExtractLibpod
            parameters:
                - description: Name or digest of the artifact
                  in: path
                  name: name
                  required: true
                  type: string
                - description: Only extract the file with the given title
                  in: query
                  name: title
                  type: string
                - description: Only extract the file with the given digest
                  in: query
                  name: digest
                  type: string
                - description: |
                    When extracting a single file from an artifact, don't use the files title as the file name in the tar archive
                  in: query
                  name: excludeTitle
                  type: boolean
            produces:
                - application/x-tar
            responses:
                "200":
                    description: Extract successful
                    schema:
                        type: file
                "400":
                    $ref: '#/responses/badParamError'
                "404":
                    $ref: '#/responses/artifactNotFound'
                "500":
                    $ref: '#/responses/internalError'
            summary: Extract an artifacts contents
            tags:
                - artifacts
    /libpod/artifacts/{name}/json:
        get:
            description: |
                Retrieve detailed information about a specific OCI artifact by name or ID.
            operationId: ArtifactInspectLibpod
            parameters:
                - description: Name or ID of the artifact
                  in: path
                  name: name
                  required: true
                  type: string
            produces:
                - application/json
            responses:
                "200":
                    $ref: '#/responses/inspectArtifactResponse'
                "404":
                    $ref: '#/responses/artifactNotFound'
                "500":
                    $ref: '#/responses/internalError'
            summary: Inspect an artifact
            tags:
                - artifacts
    /libpod/artifacts/{name}/push:
        post:
            description: Push an OCI artifact from local storage to a remote image registry.
            operationId: ArtifactPushLibpod
            parameters:
                - description: Mandatory reference to the artifact (e.g., quay.io/image/artifact:tag)
                  in: path
                  name: name
                  required: true
                  type: string
                - default: 3
                  description: Number of times to retry in case of failure when performing pull
                  in: query
                  name: retry
                  type: integer
                - default: 1s
                  description: Delay between retries in case of pull failures (e.g., 10s)
                  in: query
                  name: retryDelay
                  type: string
                - default: true
                  description: Require TLS verification
                  in: query
                  name: tlsVerify
                  type: boolean
                - description: |
                    base-64 encoded auth config.
                    Must include the following four values: username, password, email and server address
                    OR simply just an identity token.
                  in: header
                  name: X-Registry-Auth
                  type: string
            produces:
                - application/json
            responses:
                "200":
                    $ref: '#/responses/artifactPushResponse'
                "400":
                    $ref: '#/responses/badParamError'
                "401":
                    $ref: '#/responses/artifactBadAuth'
                "404":
                    $ref: '#/responses/artifactNotFound'
                "500":
                    $ref: '#/responses/internalError'
            summary: Push an artifact
            tags:
                - artifacts
    /libpod/artifacts/add:
        post:
            consumes:
                - application/octet-stream
            description: |
                Add a file as a new OCI artifact, or append to an existing artifact if 'append' is true.
            operationId: ArtifactAddLibpod
            parameters:
                - description: Mandatory reference to the artifact (e.g., quay.io/image/artifact:tag)
                  in: query
                  name: name
                  required: true
                  type: string
                - description: Path of the file to be added
                  in: query
                  name: fileName
                  required: true
                  type: string
                - description: Optionally set the type of file
                  in: query
                  name: fileMIMEType
                  type: string
                - description: Array of annotation strings e.g "test=true"
                  in: query
                  items:
                    type: string
                  name: annotations
                  type: array
                - description: Use type to describe an artifact
                  in: query
                  name: artifactMIMEType
                  type: string
                - default: false
                  description: Append files to an existing artifact
                  in: query
                  name: append
                  type: boolean
                - default: false
                  description: Replace an existing artifact with the same name
                  in: query
                  name: replace
                  type: boolean
                - description: Binary stream of the file to add to an artifact
                  in: body
                  name: inputStream
                  schema:
                    format: binary
                    type: string
            produces:
                - application/json
            responses:
                "201":
                    $ref: '#/responses/artifactAddResponse'
                "400":
                    $ref: '#/responses/badParamError'
                "404":
                    $ref: '#/responses/artifactNotFound'
                "500":
                    $ref: '#/responses/internalError'
            summary: Add a file as an artifact
            tags:
                - artifacts
    /libpod/artifacts/json:
        get:
            description: Return a list of all OCI artifacts in local storage.
            operationId: ArtifactListLibpod
            produces:
                - application/json
            responses:
                "200":
                    $ref: '#/responses/artifactListResponse'
                "500":
                    $ref: '#/responses/internalError'
            summary: List artifacts
            tags:
                - artifacts
    /libpod/artifacts/local/add:
        post:
            description: |
                Add a file from the local filesystem as a new OCI artifact, or append to an existing artifact if 'append' is true.
            operationId: ArtifactLocalLibpod
            parameters:
                - description: Mandatory reference to the artifact (e.g., quay.io/image/artifact:tag)
                  in: query
                  name: name
                  required: true
                  type: string
                - description: Absolute path to the local file on the server filesystem to be added
                  in: query
                  name: path
                  required: true
                  type: string
                - description: Name/title of the file within the artifact
                  in: query
                  name: fileName
                  required: true
                  type: string
                - description: Optionally set the MIME type of the file
                  in: query
                  name: fileMIMEType
                  type: string
                - description: Array of annotation strings e.g "test=true"
                  in: query
                  items:
                    type: string
                  name: annotations
                  type: array
                - description: Use type to describe an artifact
                  in: query
                  name: artifactMIMEType
                  type: string
                - default: false
