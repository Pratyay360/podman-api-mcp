                items:
                    type: string
                type: array
            Domainname:
                description: Container domain name - unused at present
                type: string
                x-go-name: DomainName
            Entrypoint:
                description: Container entrypoint
                items:
                    type: string
                type: array
            Env:
                description: Container environment variables
                items:
                    type: string
                type: array
            ExposedPorts:
                additionalProperties:
                    type: object
